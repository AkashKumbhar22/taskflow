spring.application.name=TaskFlow

# ==============================
# SERVER CONFIGURATION (RENDER)
# ==============================
server.port=${PORT:8080}
server.address=0.0.0.0

# ==============================
# DATABASE (RENDER POSTGRESQL)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (Recommended for Production)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Let Hibernate auto-detect dialect (recommended for Boot 3+)
# REMOVE manual dialect unless needed

# ==============================
# ACTUATOR
# ==============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.server.port=${PORT:8080}

# ==============================
# SWAGGER FIX (IMPORTANT)
# ==============================
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# ==============================
# LOGGING
# ==============================
logging.level.root=INFO
logging.level.com.taskflow=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=ERROR
